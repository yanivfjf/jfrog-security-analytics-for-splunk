# Macros configuration for JFrog Security Analytics for Splunk

[jfrog_xray_violations_index]
definition = index=jfrog sourcetype="jfrog:xray:violations"
iseval = 0

[jfrog_xray_siem_index]
definition = index=jfrog sourcetype="jfrog:xray:siem"
iseval = 0

[jfrog_artifactory_access_index]
definition = index=jfrog sourcetype="jfrog:artifactory:access"
iseval = 0

[jfrog_artifactory_request_index]
definition = index=jfrog sourcetype="jfrog:artifactory:request"
iseval = 0

[jfrog_artifactory_traffic_index]
definition = index=jfrog sourcetype="jfrog:artifactory:traffic"
iseval = 0

[jfrog_all_index]
definition = index=jfrog sourcetype="jfrog:*"
iseval = 0

[jfrog_high_severity]
definition = (severity="High" OR severity="Critical")
iseval = 0

[jfrog_critical_severity]
definition = severity="Critical"
iseval = 0

# ---------------------------------------------------------------------------
# Vulnerability Report macros
# ---------------------------------------------------------------------------

[jfrog_xray_vuln_report_index]
definition = index=jfrog sourcetype="jfrog:xray:vulnerability_report"
iseval = 0

# Parameterised: filter by one or more severities
# Usage: `jfrog_vuln_by_severity(Critical)` or `jfrog_vuln_by_severity(Critical,High)`
[jfrog_vuln_by_severity(1)]
args = severity_list
definition = `jfrog_xray_vuln_report_index` severity IN ($severity_list$)
iseval = 0

# Convenience: applicable vulns only (confirmed exploitable)
[jfrog_vuln_applicable]
definition = `jfrog_xray_vuln_report_index` applicability_result="applicable"
iseval = 0

# Convenience: high + critical from vuln reports
[jfrog_vuln_high_critical]
definition = `jfrog_xray_vuln_report_index` `jfrog_high_severity`
iseval = 0

# CVSS score threshold filter — usage: `jfrog_vuln_above_cvss(7.0)`
[jfrog_vuln_above_cvss(1)]
args = score
definition = `jfrog_xray_vuln_report_index` cvss3_max_score>=$score$
iseval = 0
