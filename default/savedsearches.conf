# Saved searches and alerts for JFrog Security Analytics for Splunk

[JFrog - Xray Critical Violations - Last 24h]
search = `jfrog_xray_violations_index` `jfrog_critical_severity` | stats count by component_name, cve, severity, watch_name | sort - count
description = Critical security violations detected by JFrog Xray in the last 24 hours
dispatch.earliest_time = -24h
dispatch.latest_time = now
enableSched = 0
is_visible = 1
display.visualizations.charting.chart = bar

[JFrog - Xray High and Critical Violations Alert]
search = `jfrog_xray_violations_index` `jfrog_high_severity` | stats count as violation_count | where violation_count > 0
description = Alert when high or critical violations are detected
alert.severity = 3
alert.track = 1
alert.expires = 24h
counttype = number of events
relation = greater than
quantity = 0
enableSched = 1
cron_schedule = */15 * * * *
dispatch.earliest_time = -15m
dispatch.latest_time = now
alert.suppress = 1
alert.suppress.period = 1h
action.email.sendresults = 0

[JFrog - Artifactory Failed Authentication - Last 1h]
search = `jfrog_artifactory_access_index` action_response="DENIED" | stats count by username, ip | sort - count
description = Failed authentication attempts to Artifactory
dispatch.earliest_time = -1h
dispatch.latest_time = now
enableSched = 0
is_visible = 1

[JFrog - Top Downloaded Artifacts]
search = `jfrog_artifactory_traffic_index` | stats sum(response_content_length) as total_bytes, count as downloads by repo, artifact | sort - downloads | head 20
description = Most frequently downloaded artifacts
dispatch.earliest_time = -24h
dispatch.latest_time = now
enableSched = 0
is_visible = 1

[JFrog - Xray Violations by Severity Over Time]
search = `jfrog_xray_violations_index` | timechart span=1h count by severity
description = Xray violations trend by severity over time
dispatch.earliest_time = -7d
dispatch.latest_time = now
enableSched = 0
is_visible = 1
display.visualizations.charting.chart = line
