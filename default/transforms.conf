# Transforms configuration for JFrog Security Analytics for Splunk

[jfrog_severity_lookup]
filename = jfrog_severity.csv
default_match = Unknown

[jfrog_cve_lookup]
filename = jfrog_cve.csv
default_match = Unknown

[jfrog_policy_lookup]
filename = jfrog_policy.csv
default_match = Unknown

[jfrog_repo_type_lookup]
filename = jfrog_repo_type.csv
default_match = Unknown

# Field extractions for Xray violations
[xfrom_xray_violation_type]
SOURCE_KEY = violation_type
REGEX = (?<violation_category>SECURITY|LICENSE|OPERATIONAL_RISK)

[extract_cvss_score]
SOURCE_KEY = cvss_score
REGEX = (?<cvss_numeric>[\d\.]+)
