# Transforms configuration for JFrog Security Analytics for Splunk

[jfrog_severity_lookup]
filename = jfrog_severity.csv
default_match = Unknown

[jfrog_cve_lookup]
filename = jfrog_cve.csv
default_match = Unknown

[jfrog_policy_lookup]
filename = jfrog_policy.csv
default_match = Unknown

[jfrog_repo_type_lookup]
filename = jfrog_repo_type.csv
default_match = Unknown

# Field extractions for Xray violations
[xfrom_xray_violation_type]
SOURCE_KEY = violation_type
REGEX = (?<violation_category>SECURITY|LICENSE|OPERATIONAL_RISK)

[extract_cvss_score]
SOURCE_KEY = cvss_score
REGEX = (?<cvss_numeric>[\d\.]+)

# ---------------------------------------------------------------------------
# Vulnerability Report transforms
# ---------------------------------------------------------------------------

# Lookup: enrich severity with a numeric rank and display colour.
# Input field:  severity  (Critical / High / Medium / Low / Unknown)
# Output fields: severity_rank, severity_color, severity_label
[jfrog_vuln_severity_lookup]
filename           = jfrog_severity.csv
match_type         = WILDCARD(severity)
default_match      = Unknown
max_matches        = 1

# Extract scheme and coordinates from vulnerable_component
# e.g. "pypi://vllm:0.12.0"  → package_type_scheme=pypi, package_name=vllm, package_version=0.12.0
# e.g. "go://github.com/foo/bar:1.2.3" → package_name=github.com/foo/bar, package_version=1.2.3
[extract_vulnerable_component_fields]
SOURCE_KEY = vulnerable_component
REGEX      = ^(?<package_type_scheme>[^:]+)://(?<package_name>.+):(?P<package_version>[^:]+)$

# Extract artifact type from impacted_artifact scheme
# e.g. "docker://repo/image:tag" → artifact_type=docker
[extract_impacted_artifact_type]
SOURCE_KEY = impacted_artifact
REGEX      = ^(?<artifact_type>[^:]+)://

# Extract CVE year from CVE ID for trend-by-year analysis
# e.g. "CVE-2026-22807" → cve_year=2026
[extract_cve_year]
SOURCE_KEY = cve
REGEX      = CVE-(?<cve_year>\d{4})-

# Applicability result → human-readable label
[jfrog_applicability_lookup]
filename      = jfrog_applicability.csv
default_match = Unknown
max_matches   = 1
