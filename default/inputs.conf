# Inputs configuration for JFrog Security Analytics for Splunk
# Configure these stanzas to match your JFrog log file paths

# Uncomment and configure the following stanzas based on your environment

# [monitor:///var/opt/jfrog/artifactory/log/access.log]
# sourcetype = jfrog:artifactory:access
# index = jfrog
# disabled = true

# [monitor:///var/opt/jfrog/artifactory/log/request.log]
# sourcetype = jfrog:artifactory:request
# index = jfrog
# disabled = true

# [monitor:///var/opt/jfrog/artifactory/log/traffic.*.log]
# sourcetype = jfrog:artifactory:traffic
# index = jfrog
# disabled = true

# [monitor:///var/opt/jfrog/xray/log/xray-server-service.log]
# sourcetype = jfrog:xray:violations
# index = jfrog
# disabled = true
