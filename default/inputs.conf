# ---------------------------------------------------------------------------
# JFrog Xray Vulnerability Report - Scripted Input
# ---------------------------------------------------------------------------
# Reads JFrog Xray vulnerability report JSON files exported from the JFrog
# Platform UI (Security > Reports > Vulnerabilities > Export) or via the
# Xray REST API (/api/v1/reports/vulnerabilities/<report_id>).
#
# The script scans JFROG_VULN_REPORT_DIR for new *.json report files,
# splits each file's "rows" array into individual Splunk events, and writes
# them to stdout. A checkpoint file prevents re-ingesting the same file.
#
# Setup steps:
#   1. Create the report drop directory on the Splunk heavy forwarder or
#      search head, e.g.:
#        mkdir -p /opt/splunk/var/data/jfrog_vuln_reports
#
#   2. Configure the directory path by setting JFROG_VULN_REPORT_DIR below.
#
#   3. Drop exported report JSON files into that directory. They will be
#      picked up on the next scripted input run (every 5 minutes by default).
#
#   4. Set disabled = false to activate the input.
#
# [script://./bin/jfrog_vuln_report_input.py]
# sourcetype    = jfrog:xray:vulnerability_report
# index         = jfrog
# interval      = 300
# passAuth      = admin
# disabled      = true
# # Path to the directory containing exported Xray vulnerability report JSON files.
# # Override by setting the environment variable JFROG_VULN_REPORT_DIR.
# # Example: /opt/splunk/var/data/jfrog_vuln_reports
# # JFROG_VULN_REPORT_DIR = /opt/splunk/var/data/jfrog_vuln_reports

# ---------------------------------------------------------------------------
# HTTP Event Collector (HEC) — JFrog Xray Vulnerability Reports
# ---------------------------------------------------------------------------
# Receives vulnerability events POSTed to the HEC endpoint from the JFrog
# Platform webhook, a CI/CD pipeline, or the companion ingest script.
#
# POST format (one JSON object per request or newline-delimited batch):
#   curl -k https://<splunk-host>:8088/services/collector/event \
#     -H "Authorization: Splunk <token>" \
#     -H "Content-Type: application/json" \
#     -d '{"event": <vulnerability-row-json>, "sourcetype": "jfrog:xray:vulnerability_report", "index": "jfrog"}'
#
# Setup steps:
#   1. Enable HEC globally (Settings > Data Inputs > HTTP Event Collector >
#      Global Settings > All tokens: Enabled).
#   2. Activate this token stanza by setting disabled = false.
#   3. Use the token value shown in Splunk UI (or generate via REST API) in
#      the Authorization header of your POST requests.
#   4. The HEC endpoint listens on port 8088 (SSL) by default.
#
# REST API — create token:
#   POST https://<splunk-host>:8089/services/data/inputs/http/jfrog_vuln_reports
#     name=jfrog_vuln_reports&index=jfrog&sourcetype=jfrog:xray:vulnerability_report&disabled=0
#
[http://jfrog_vuln_reports]
disabled    = false
index       = jfrog
indexes     = jfrog
sourcetype  = jfrog:xray:vulnerability_report
token       = 7b3630d0-02db-4f10-823d-2548f8985c02
description = JFrog Xray vulnerability report events ingested via HEC

