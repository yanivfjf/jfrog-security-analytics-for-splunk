# sourcetype = jfrog:xray:violations
# index = jfrog
# disabled = true

# ---------------------------------------------------------------------------
# JFrog Xray Vulnerability Report - Scripted Input
# ---------------------------------------------------------------------------
# Reads JFrog Xray vulnerability report JSON files exported from the JFrog
# Platform UI (Security > Reports > Vulnerabilities > Export) or via the
# Xray REST API (/api/v1/reports/vulnerabilities/<report_id>).
#
# The script scans JFROG_VULN_REPORT_DIR for new *.json report files,
# splits each file's "rows" array into individual Splunk events, and writes
# them to stdout. A checkpoint file prevents re-ingesting the same file.
#
# Setup steps:
#   1. Create the report drop directory on the Splunk heavy forwarder or
#      search head, e.g.:
#        mkdir -p /opt/splunk/var/data/jfrog_vuln_reports
#
#   2. Configure the directory path by setting JFROG_VULN_REPORT_DIR below.
#
#   3. Drop exported report JSON files into that directory. They will be
#      picked up on the next scripted input run (every 5 minutes by default).
#
#   4. Set disabled = false to activate the input.
#
# [script://./bin/jfrog_vuln_report_input.py]
# sourcetype    = jfrog:xray:vulnerability_report
# index         = jfrog
# interval      = 300
# passAuth      = admin
# disabled      = true
# # Path to the directory containing exported Xray vulnerability report JSON files.
# # Override by setting the environment variable JFROG_VULN_REPORT_DIR.
# # Example: /opt/splunk/var/data/jfrog_vuln_reports
# # JFROG_VULN_REPORT_DIR = /opt/splunk/var/data/jfrog_vuln_reports
