# [monitor:///var/opt/jfrog/artifactory/log/access.log]
# sourcetype = jfrog:artifactory:access
# index = jfrog
# disabled = true

# [monitor:///var/opt/jfrog/artifactory/log/request.log]
# sourcetype = jfrog:artifactory:request
# index = jfrog
