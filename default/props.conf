# Props configuration for JFrog Security Analytics for Splunk
# Defines source type configurations for JFrog log sources

[jfrog:artifactory:access]
SHOULD_LINEMERGE = false
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3N%z
TIME_PREFIX = \"time\"\s*:\s*\"
MAX_TIMESTAMP_LOOKAHEAD = 40
KV_MODE = json
TRUNCATE = 10000
category = JFrog
description = JFrog Artifactory Access Logs

[jfrog:artifactory:request]
SHOULD_LINEMERGE = false
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3N%z
TIME_PREFIX = \"time\"\s*:\s*\"
MAX_TIMESTAMP_LOOKAHEAD = 40
KV_MODE = json
TRUNCATE = 10000
category = JFrog
description = JFrog Artifactory Request Logs

[jfrog:artifactory:traffic]
SHOULD_LINEMERGE = false
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3N%z
TIME_PREFIX = \"time\"\s*:\s*\"
MAX_TIMESTAMP_LOOKAHEAD = 40
