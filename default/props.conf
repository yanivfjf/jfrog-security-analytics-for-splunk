[jfrog:xray:vulnerability_report]
# One JSON object per line emitted by bin/jfrog_vuln_report_input.py.
# Each line represents a single vulnerability row from an Xray report export.
SHOULD_LINEMERGE = false
# Use artifact_scan_time as the Splunk event timestamp
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
TIME_PREFIX = \"artifact_scan_time\"\s*:\s*\"
MAX_TIMESTAMP_LOOKAHEAD = 30
KV_MODE = json
# Events can be large due to the summary field
TRUNCATE = 50000
category = JFrog
description = JFrog Xray Vulnerability Report (exported JSON)

# Multi-value field definitions for array fields emitted by the input script
MV_ADD = true
FIELDALIAS-vuln_report_cve    = cve AS vulnerability_id
FIELDALIAS-vuln_report_issueid = issue_id AS xray_issue_id
